name: Hotel Price Check

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: hotel-price-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      BOOKING_COOKIES_JSON: ${{ secrets.BOOKING_COOKIES_JSON }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: Locate Chrome
        run: |
          CHROME_BIN=$(command -v google-chrome-stable || command -v google-chrome || command -v chromium-browser || command -v chromium)
          echo "Using Chrome at: $CHROME_BIN"
          echo "CHROME_PATH=$CHROME_BIN" >> "$GITHUB_ENV"

      - name: Write Genius session cookies
        if: ${{ env.BOOKING_COOKIES_JSON != '' }}
        run: printf '%s' "$BOOKING_COOKIES_JSON" > data/booking-cookies.json

      - name: Run price check
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
        run: node server/scripts/checkOnce.js

      - name: Commit updated alert data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/db.json
          git diff --cached --quiet || git commit -m "chore: update price check data"
          git push
